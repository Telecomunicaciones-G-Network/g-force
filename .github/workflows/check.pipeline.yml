name: Check GForce Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          bun install

      - name: Type checking
        run: |
          echo "Checking types..."
          bun typecheck

      - name: Linting
        run: |
          echo "Linting..."
          bun lint